<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InTube - AI + Free Movies & Games</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0d0d0d;
      color: white;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #202020;
      padding: 15px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      color: #ff4040;
    }
    .search-bar {
      display: flex;
      justify-content: center;
      margin: 20px;
    }
    .search-bar input {
      width: 60%;
      padding: 10px;
      font-size: 1em;
      border: none;
      border-radius: 5px;
    }
    section {
      padding: 20px;
    }
    h2 {
      color: #ffcc00;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }
    .video-card {
      background: #1c1c1c;
      padding: 10px;
      border-radius: 8px;
    }
    iframe {
      width: 100%;
      height: 150px;
      border: none;
    }
    button {
      background-color: #ff4040;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    .ad-banner {
      text-align: center;
      margin: 20px auto;
      background: #1a1a1a;
      border: 2px dashed #ffcc00;
      padding: 20px;
      border-radius: 10px;
    }
    footer {
      text-align:center;
      padding:20px;
      background:#111;
    }
  </style>
</head>
<body>

<!-- 🔊 Background music (safe embed - no autoplay issues) -->
<iframe
  src="https://www.youtube.com/embed/RsEZmictANA?mute=1&loop=1&playlist=RsEZmictANA"
  style="display: none;"
  allow="autoplay"
  frameborder="0"
></iframe>

<header>
  <h1>InTube 🎬</h1>
  <p>Free Movies, Playable Games, and AI-Only Content</p>
</header>

<div class="search-bar">
  <input id="searchInput" type="text" placeholder="Search InTube..." oninput="searchVideos()">
</div>

<!-- Ad section with valid embed -->
<div class="ad-banner">
  <h3>Advertisement</h3>
  <iframe src="https://www.youtube.com/embed/6ZfuNTqbHE8" title="Ad" allowfullscreen></iframe>
  <p><i>Ad preview only</i></p>
</div>

<section id="aiSearchSection">
  <h2>🔍 Search Result (AI-Generated)</h2>
  <div class="video-grid" id="searchResults"></div>
</section>

<section>
  <h2>🧠 AI Video Zone (Playable)</h2>
  <div class="video-grid" id="aiVideoList"></div>
</section>

<script>
  const aiVideos = [];

  const videoSources = [
    "https://www.youtube.com/embed/ScMzIvxBSi4",
    "https://www.youtube.com/embed/IUN664s7N-c",
    "https://www.youtube.com/embed/RsEZmictANA",
    "https://www.youtube.com/embed/xLCn88bfW1o",
    "https://www.youtube.com/embed/sBws8MSXN7A",
    "https://www.youtube.com/embed/LXb3EKWsInQ",
    "https://www.youtube.com/embed/2vjPBrBU-TM",
    "https://www.youtube.com/embed/V-_O7nl0Ii0"
  ];

  const topics = ["Aliens", "Cats", "Robots", "Space", "Cyberpunk", "Magic", "AI Cooking", "Dragon Riders", "Hologram Battles"];
  const verbs = ["vs", "Explore", "Discover", "Battle", "Dance With", "Hack", "Build", "Teleport"];
  const endings = ["in Tokyo", "from Mars", "in the Future", "on Earth", "Inside a Game", "with Lasers"];

  for (let i = 1; i <= 100; i++) {
    const title = `${topics[i % topics.length]} ${verbs[i % verbs.length]} ${endings[i % endings.length]}`;
    aiVideos.push({
      id: i,
      title,
      embed: videoSources[i % videoSources.length]
    });
  }

  const aiVideoList = document.getElementById("aiVideoList");
  const searchResults = document.getElementById("searchResults");

  function loadAllAIVideos() {
    aiVideos.forEach(video => {
      const card = document.createElement("div");
      card.className = "video-card";
      card.innerHTML = `
        <iframe src="${video.embed}" title="${video.title}" allowfullscreen></iframe>
        <p>${video.title}</p>
      `;
      aiVideoList.appendChild(card);
    });
  }

  function searchVideos() {
    const query = document.getElementById("searchInput").value.toLowerCase();
    searchResults.innerHTML = "";

    if (query === "") return;

    const matches = aiVideos.filter(v => v.title.toLowerCase().includes(query)).slice(0, 6);
    if (matches.length === 0) {
      searchResults.innerHTML = `<p>No results found for "${query}"</p>`;
    } else {
      matches.forEach(video => {
        const card = document.createElement("div");
        card.className = "video-card";
        card.innerHTML = `
          <iframe src="${video.embed}" title="${video.title}" allowfullscreen></iframe>
          <p>${video.title}</p>
        `;
        searchResults.appendChild(card);
      });
    }
  }

  // Load AI videos
  loadAllAIVideos();
</script>

<footer>
  <p>© 2025 InTube. Educational demo only. Not affiliated with YouTube.</p>
</footer>

</body>
</html>
